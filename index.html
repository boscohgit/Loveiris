<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="Every day since June 19, 2018, counted in real time.">
    <title>Still You | Our Time</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --black: #050505;
            --white: #f5f5f7;
            --soft-white: rgba(245, 245, 247, 0.68);
            --quiet-white: rgba(245, 245, 247, 0.38);
            --hairline: rgba(245, 245, 247, 0.16);
            --blue: #2997ff;
            --orange: #ff7a45;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-width: 320px;
            min-height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--black);
        }

        body {
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        .experience {
            position: relative;
            isolation: isolate;
            width: 100%;
            height: 100vh;
            height: 100svh;
            min-height: 620px;
            overflow: hidden;
            background: var(--black);
        }

        .particles {
            position: absolute;
            inset: 0;
            z-index: -3;
            width: 100%;
            height: 100%;
            opacity: 0.7;
            pointer-events: none;
        }

        .ripple-field {
            position: absolute;
            top: 44%;
            left: 50%;
            z-index: -2;
            width: 900px;
            height: 900px;
            pointer-events: none;
            transform: translate3d(calc(-50% + var(--pointer-x, 0px)), calc(-50% + var(--pointer-y, 0px)), 0);
            transition: transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
            mask-image: linear-gradient(to bottom, transparent 2%, #000 18%, #000 77%, transparent 98%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 2%, #000 18%, #000 77%, transparent 98%);
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--size);
            height: var(--size);
            border: 1px solid rgba(245, 245, 247, var(--ring-opacity));
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.965);
            animation: ripple-breathe 6s var(--delay) ease-in-out infinite alternate;
        }

        .ripple:nth-child(2n) {
            border-color: rgba(41, 151, 255, var(--ring-opacity));
        }

        .ripple:nth-child(3n) {
            border-color: rgba(255, 122, 69, var(--ring-opacity));
        }

        .content {
            position: relative;
            z-index: 1;
            width: min(1120px, calc(100% - 64px));
            height: 100%;
            margin: 0 auto;
            padding: max(42px, env(safe-area-inset-top)) 0 max(38px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .origin {
            margin: 0;
            color: var(--soft-white);
            font-size: 0.82rem;
            font-weight: 500;
            line-height: 1;
            text-align: center;
        }

        .origin time {
            color: var(--white);
        }

        .hero {
            align-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .day-lockup {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .day-number {
            display: block;
            min-width: 5.2ch;
            color: var(--white);
            font-size: 12rem;
            font-weight: 650;
            line-height: 0.82;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            text-shadow: 0 20px 70px rgba(0, 0, 0, 0.72);
        }

        .day-label {
            margin-top: 26px;
            color: var(--soft-white);
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1;
        }

        .declaration {
            margin: 54px 0 0;
            color: var(--white);
            font-size: 2.75rem;
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: 0;
        }

        .declaration span {
            color: var(--quiet-white);
        }

        .precision {
            width: min(660px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            border-top: 1px solid var(--hairline);
        }

        .precision__item {
            min-width: 0;
            padding: 18px 20px 0;
            text-align: center;
        }

        .precision__item + .precision__item {
            border-left: 1px solid var(--hairline);
        }

        .precision__value {
            display: block;
            min-height: 2.15rem;
            color: var(--white);
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .precision__value.is-ticking {
            animation: digit-change 420ms cubic-bezier(0.22, 1, 0.36, 1);
        }

        .precision__label {
            display: block;
            margin-top: 7px;
            color: var(--quiet-white);
            font-size: 0.68rem;
            font-weight: 500;
            line-height: 1;
        }

        [data-blur-fade] {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(10px);
            transition:
                opacity 700ms var(--delay, 0ms) cubic-bezier(0.22, 1, 0.36, 1),
                filter 700ms var(--delay, 0ms) cubic-bezier(0.22, 1, 0.36, 1),
                transform 700ms var(--delay, 0ms) cubic-bezier(0.22, 1, 0.36, 1);
        }

        .is-ready [data-blur-fade] {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }

        .accent {
            position: absolute;
            top: 0;
            left: 50%;
            width: 42px;
            height: 2px;
            overflow: hidden;
            transform: translateX(-50%);
        }

        .accent::before,
        .accent::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
        }

        .accent::before {
            left: 0;
            background: var(--orange);
        }

        .accent::after {
            right: 0;
            background: var(--blue);
        }

        @keyframes ripple-breathe {
            from {
                opacity: 0.42;
                transform: translate(-50%, -50%) scale(0.965);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.025);
            }
        }

        @keyframes digit-change {
            from {
                opacity: 0;
                filter: blur(5px);
                transform: translateY(30%);
            }
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .experience {
                min-height: 560px;
            }

            .content {
                width: calc(100% - 40px);
                padding-top: max(30px, env(safe-area-inset-top));
                padding-bottom: max(28px, env(safe-area-inset-bottom));
            }

            .ripple-field {
                top: 43%;
                width: 620px;
                height: 620px;
            }

            .day-number {
                font-size: 7.25rem;
                line-height: 0.84;
            }

            .day-label {
                margin-top: 20px;
                font-size: 0.95rem;
            }

            .declaration {
                margin-top: 42px;
                font-size: 2.35rem;
            }

            .precision__item {
                padding: 16px 8px 0;
            }

            .precision__value {
                min-height: 1.95rem;
                font-size: 1.55rem;
            }
        }

        @media (max-height: 680px) {
            .content {
                padding-top: 24px;
                padding-bottom: 22px;
            }

            .day-number {
                font-size: 6.4rem;
            }

            .day-label {
                margin-top: 15px;
            }

            .declaration {
                margin-top: 28px;
                font-size: 2rem;
            }

            .precision__item {
                padding-top: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            .ripple-field {
                transform: translate(-50%, -50%) !important;
            }
        }
    </style>
</head>
<body>
    <main class="experience">
        <div class="accent" aria-hidden="true"></div>
        <canvas class="particles" id="particles" aria-hidden="true"></canvas>

        <div class="ripple-field" id="rippleField" aria-hidden="true">
            <span class="ripple" style="--size: 250px; --ring-opacity: 0.11; --delay: 0s"></span>
            <span class="ripple" style="--size: 350px; --ring-opacity: 0.09; --delay: 0.18s"></span>
            <span class="ripple" style="--size: 450px; --ring-opacity: 0.075; --delay: 0.36s"></span>
            <span class="ripple" style="--size: 550px; --ring-opacity: 0.06; --delay: 0.54s"></span>
            <span class="ripple" style="--size: 650px; --ring-opacity: 0.05; --delay: 0.72s"></span>
            <span class="ripple" style="--size: 750px; --ring-opacity: 0.04; --delay: 0.9s"></span>
        </div>

        <div class="content">
            <p class="origin" data-blur-fade style="--delay: 80ms">
                Together since <time datetime="2018-06-19">June 19, 2018</time>
            </p>

            <section class="hero" aria-labelledby="declaration">
                <div class="day-lockup" data-blur-fade style="--delay: 180ms">
                    <span class="day-number" id="dayTicker">0</span>
                    <span class="day-label">days together, and counting</span>
                </div>

                <h1 class="declaration" id="declaration" data-blur-fade style="--delay: 420ms">
                    Still you. <span>Always you.</span>
                </h1>
            </section>

            <div class="precision" data-blur-fade style="--delay: 600ms" aria-label="Precise time together">
                <div class="precision__item">
                    <span class="precision__value" id="hours">00</span>
                    <span class="precision__label">hours</span>
                </div>
                <div class="precision__item">
                    <span class="precision__value" id="minutes">00</span>
                    <span class="precision__label">minutes</span>
                </div>
                <div class="precision__item">
                    <span class="precision__value" id="seconds">00</span>
                    <span class="precision__label">seconds</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const loveDate = new Date(2018, 5, 19, 0, 0, 0);
        const dayMs = 24 * 60 * 60 * 1000;
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const dayTicker = document.getElementById("dayTicker");
        const rippleField = document.getElementById("rippleField");
        let tickerTarget = 0;
        let tickerFrame = 0;

        function elapsedTime() {
            const diff = Math.max(0, Date.now() - loveDate.getTime());
            return {
                days: Math.floor(diff / dayMs),
                hours: Math.floor((diff % dayMs) / (60 * 60 * 1000)),
                minutes: Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000)),
                seconds: Math.floor((diff % (60 * 1000)) / 1000)
            };
        }

        function setTicker(id, value) {
            const element = document.getElementById(id);
            if (element.textContent === value) return;
            element.textContent = value;
            element.classList.remove("is-ticking");
            void element.offsetWidth;
            element.classList.add("is-ticking");
        }

        function updatePrecision() {
            const elapsed = elapsedTime();
            setTicker("hours", String(elapsed.hours).padStart(2, "0"));
            setTicker("minutes", String(elapsed.minutes).padStart(2, "0"));
            setTicker("seconds", String(elapsed.seconds).padStart(2, "0"));

            if (elapsed.days !== tickerTarget) {
                tickerTarget = elapsed.days;
                dayTicker.textContent = tickerTarget.toLocaleString("en-US");
            }
        }

        function animateDayTicker() {
            tickerTarget = elapsedTime().days;
            if (reduceMotion) {
                dayTicker.textContent = tickerTarget.toLocaleString("en-US");
                return;
            }

            let value = Math.max(0, tickerTarget - 90);
            let velocity = 0;
            let previousTime = performance.now();

            function step(now) {
                const dt = Math.min(0.032, Math.max(0, (now - previousTime) / 1000));
                previousTime = now;
                const displacement = tickerTarget - value;
                const acceleration = displacement * 95 - velocity * 20;
                velocity += acceleration * dt;
                value += velocity * dt;
                dayTicker.textContent = Math.round(value).toLocaleString("en-US");

                if (Math.abs(displacement) > 0.01 || Math.abs(velocity) > 0.01) {
                    tickerFrame = requestAnimationFrame(step);
                } else {
                    dayTicker.textContent = tickerTarget.toLocaleString("en-US");
                }
            }

            cancelAnimationFrame(tickerFrame);
            tickerFrame = requestAnimationFrame(step);
        }

        function setupPointerDepth() {
            if (reduceMotion) return;
            window.addEventListener("pointermove", (event) => {
                const x = (event.clientX / window.innerWidth - 0.5) * 10;
                const y = (event.clientY / window.innerHeight - 0.5) * 8;
                rippleField.style.setProperty("--pointer-x", `${x}px`);
                rippleField.style.setProperty("--pointer-y", `${y}px`);
            }, { passive: true });
        }

        function setupParticles() {
            const canvas = document.getElementById("particles");
            const context = canvas.getContext("2d");
            const colors = ["245,245,247", "41,151,255", "255,122,69"];
            let width = 0;
            let height = 0;
            let dpr = 1;
            let pointerX = 0;
            let pointerY = 0;
            let particles = [];
            let animationFrame = 0;

            function createParticle() {
                return {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: 0.35 + Math.random() * 0.8,
                    alpha: 0.025 + Math.random() * 0.12,
                    dx: (Math.random() - 0.5) * 0.045,
                    dy: (Math.random() - 0.5) * 0.045,
                    depth: 0.2 + Math.random() * 0.8,
                    color: colors[Math.floor(Math.random() * colors.length)]
                };
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                context.setTransform(dpr, 0, 0, dpr, 0, 0);
                const quantity = width < 720 ? 22 : 38;
                particles = Array.from({ length: quantity }, createParticle);
                draw();
            }

            function draw() {
                context.clearRect(0, 0, width, height);
                particles.forEach((particle) => {
                    const offsetX = pointerX * particle.depth;
                    const offsetY = pointerY * particle.depth;
                    context.beginPath();
                    context.arc(particle.x + offsetX, particle.y + offsetY, particle.radius, 0, Math.PI * 2);
                    context.fillStyle = `rgba(${particle.color}, ${particle.alpha})`;
                    context.fill();
                });
            }

            function animate() {
                particles.forEach((particle) => {
                    particle.x += particle.dx;
                    particle.y += particle.dy;
                    if (particle.x < -2) particle.x = width + 2;
                    if (particle.x > width + 2) particle.x = -2;
                    if (particle.y < -2) particle.y = height + 2;
                    if (particle.y > height + 2) particle.y = -2;
                });
                draw();
                animationFrame = requestAnimationFrame(animate);
            }

            window.addEventListener("resize", resize);
            window.addEventListener("pointermove", (event) => {
                pointerX += ((event.clientX / width - 0.5) * 8 - pointerX) / 18;
                pointerY += ((event.clientY / height - 0.5) * 8 - pointerY) / 18;
            }, { passive: true });

            resize();
            if (!reduceMotion) {
                animationFrame = requestAnimationFrame(animate);
            }

            window.addEventListener("pagehide", () => cancelAnimationFrame(animationFrame), { once: true });
        }

        updatePrecision();
        animateDayTicker();
        setupPointerDepth();
        setupParticles();
        requestAnimationFrame(() => document.body.classList.add("is-ready"));
        setInterval(updatePrecision, 1000);
    </script>
</body>
</html>
