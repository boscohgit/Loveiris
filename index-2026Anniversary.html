<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#211714">
    <title>For Iris | July 9</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fff8ef;
            --ink: #241815;
            --rose: #9d514a;
            --gold: #d1aa69;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--paper);
            background: var(--ink);
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            background:
                linear-gradient(90deg, rgba(24, 15, 13, 0.82), rgba(24, 15, 13, 0.56), rgba(24, 15, 13, 0.22)),
                linear-gradient(180deg, rgba(24, 15, 13, 0.06), rgba(24, 15, 13, 0.64)),
                url("assets/anniversary-window.jpg");
            background-size: cover;
            background-position: center;
        }

        .content {
            width: min(760px, 100%);
            margin-right: auto;
        }

        .date {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 18px;
            color: rgba(255, 248, 239, 0.82);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .date::before {
            content: "";
            width: 42px;
            height: 1px;
            background: var(--gold);
        }

        h1 {
            margin: 0;
            max-width: 720px;
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: clamp(4rem, 10vw, 8.6rem);
            line-height: 0.86;
            letter-spacing: 0;
        }

        .message {
            max-width: 600px;
            margin: 28px 0 0;
            color: rgba(255, 248, 239, 0.88);
            font-size: clamp(1.08rem, 2vw, 1.35rem);
            line-height: 1.7;
        }

        .timer {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            width: min(620px, 100%);
            margin-top: 36px;
        }

        .unit {
            container-type: inline-size;
            min-height: 104px;
            padding: 16px 10px;
            border: 1px solid rgba(255, 248, 239, 0.2);
            border-radius: 8px;
            background: rgba(255, 248, 239, 0.9);
            color: var(--ink);
            text-align: center;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .number {
            display: block;
            max-width: 100%;
            color: var(--rose);
            font-size: clamp(2rem, 28cqw, 3rem);
            line-height: 1;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .label {
            display: block;
            margin-top: 10px;
            color: rgba(36, 24, 21, 0.66);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .since {
            margin: 18px 0 0;
            color: rgba(255, 248, 239, 0.72);
            font-size: 0.98rem;
            font-weight: 600;
        }

        @media (max-width: 620px) {
            main {
                align-items: end;
                padding: 22px 14px 44px;
                background:
                    linear-gradient(180deg, rgba(24, 15, 13, 0.52), rgba(24, 15, 13, 0.84)),
                    url("assets/anniversary-window.jpg");
                background-size: cover;
                background-position: 63% center;
            }

            h1 {
                font-size: clamp(3.6rem, 18vw, 5.3rem);
            }

            .timer {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .unit {
                min-height: 94px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="content" aria-label="Anniversary message for Iris">
            <p class="date">July 9, 2021</p>
            <h1>Happy Anniversary, Iris.</h1>
            <p class="message">
                Even when you are away on a business trip, I want you to know this:
                I love you, I miss you, and I am grateful for every day since we became husband and wife.
            </p>

            <div class="timer" aria-live="polite">
                <div class="unit">
                    <span class="number" id="days">0</span>
                    <span class="label">Days</span>
                </div>
                <div class="unit">
                    <span class="number" id="hours">0</span>
                    <span class="label">Hours</span>
                </div>
                <div class="unit">
                    <span class="number" id="minutes">0</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="unit">
                    <span class="number" id="seconds">0</span>
                    <span class="label">Seconds</span>
                </div>
            </div>

            <p class="since" id="officialLine">We made it official.</p>
        </section>
    </main>

    <script>
        const registeredAt = new Date(2021, 6, 9, 0, 0, 0);
        const dayMs = 1000 * 60 * 60 * 24;
        const hourMs = 1000 * 60 * 60;
        const minuteMs = 1000 * 60;

        function updateTimer() {
            const diff = Math.max(0, new Date() - registeredAt);
            const days = Math.floor(diff / dayMs);
            const hours = Math.floor((diff % dayMs) / hourMs);
            const minutes = Math.floor((diff % hourMs) / minuteMs);
            const seconds = Math.floor((diff % minuteMs) / 1000);

            document.getElementById("days").textContent = days.toLocaleString("en-US");
            document.getElementById("hours").textContent = hours;
            document.getElementById("minutes").textContent = minutes;
            document.getElementById("seconds").textContent = seconds;
            document.getElementById("officialLine").textContent =
                `We made it official ${days.toLocaleString("en-US")} days ago.`;
        }

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
